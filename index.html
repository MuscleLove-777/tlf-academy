<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLF Academy - 臨床試験TLFプロ育成プラットフォーム</title>
    <meta name="description" content="TLFアカデミー - 臨床試験のTables, Listings, Figuresを基礎からプロレベルまで体系的に学べる日本語学習プラットフォーム。SAS/Rプログラミング、品質管理、規制要件まで網羅。">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
    @media (max-width: 768px) {
        html { overflow-x: hidden; -webkit-text-size-adjust: 100%; }
        body { height: 100dvh !important; }
        .main-layout { height: calc(100dvh - var(--header-height, 60px)) !important; }
        .sidebar {
            position: fixed !important;
            top: var(--header-height, 60px) !important;
            left: 0 !important;
            bottom: 0 !important;
            z-index: 50 !important;
            transform: translateX(-100%) !important;
            transition: transform 0.3s ease !important;
            width: var(--sidebar-width, 280px) !important;
        }
        .sidebar.open { transform: translateX(0) !important; left: 0 !important; }
        .content { width: 100% !important; max-width: 100vw !important; padding: 16px !important; -webkit-overflow-scrolling: touch; }
        .header { padding: 0 12px !important; }
        .header-center { display: none !important; }
        .sidebar-toggle { display: block !important; }
        .btn-icon { min-width: 44px; min-height: 44px; }
        .module-body table { display: block; overflow-x: auto; max-width: 100%; }
        .dashboard-grid { grid-template-columns: 1fr !important; }
        .module-nav { flex-direction: column !important; }
        .dashboard-hero { padding: 24px 16px !important; }
        .dashboard-hero h2 { font-size: 1.3rem !important; }
        .modal { width: 92% !important; padding: 24px 16px !important; }
    }
    </style>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <button class="sidebar-toggle" onclick="App.toggleSidebar()" aria-label="メニュー">☰</button>
                <h1 class="logo">TLF<span class="logo-accent">Academy</span></h1>
            </div>
            <div class="header-center">
                <div class="global-progress">
                    <div class="global-progress-bar">
                        <div class="global-progress-fill" id="globalProgressFill"></div>
                    </div>
                    <span class="global-progress-text" id="globalProgressText">0% 完了</span>
                </div>
            </div>
            <div class="header-right">
                <button class="btn-icon" onclick="App.toggleDarkMode()" title="ダークモード切替">🌙</button>
                <button class="btn-icon" onclick="App.resetProgress()" title="進捗リセット">🔄</button>
            </div>
        </header>

        <div class="main-layout">
            <!-- Sidebar -->
            <nav class="sidebar" id="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-item dashboard-link" onclick="App.showDashboard()">
                        <span class="sidebar-icon">📊</span>
                        <span>ダッシュボード</span>
                    </div>
                </div>
                <div id="sidebarNav"></div>
            </nav>

            <!-- Main Content -->
            <main class="content" id="mainContent">
                <div id="dashboardView"></div>
                <div id="moduleView" style="display:none;"></div>
                <div id="quizView" style="display:none;"></div>
            </main>
        </div>
    </div>

    <!-- Quiz Result Modal -->
    <div class="modal-overlay" id="modalOverlay" style="display:none;">
        <div class="modal" id="modalContent"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-r.min.js"></script>
    <script src="js/level1-data.js"></script>
    <script src="js/level2-data.js"></script>
    <script src="js/level3-data.js"></script>
    <script src="js/level4-data.js"></script>
    <script src="js/level5-data.js"></script>
    <script src="js/level6-data.js"></script>
    <script src="js/level7-data.js"></script>
    <script src="js/level8-data.js"></script>
    <script src="js/level9-data.js"></script>
    <script src="js/level10-data.js"></script>
    <script src="js/level11-data.js"></script>
    <script src="js/level12-data.js"></script>
    <script src="js/level13-data.js"></script>
    <script src="js/quiz.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
